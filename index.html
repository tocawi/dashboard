<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToCAWI //Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-orange: #ff5f1f;
            --neon-red: #ff2a2a;
            --neon-green: #39ff14;
            --neon-yellow: #fefe33;
            --dark-bg: #0a0a0a;
            --panel-bg: #141414;
        }
        * { box-sizing: border-box; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0 auto; padding: 20px; max-width: 1600px; width: 100%; }

        /* Animations */
        @keyframes glow {
            0% { box-shadow: 0 0 5px var(--neon-red); }
            50% { box-shadow: 0 0 20px var(--neon-red); }
            100% { box-shadow: 0 0 5px var(--neon-red); }
        }
        .animate-glow { animation: glow 1.5s infinite; border-color: var(--neon-red) !important; color: var(--neon-red) !important; }

        .header { text-align: center; color: var(--neon-orange); text-shadow: 0 0 10px var(--neon-orange); margin-bottom: 30px; text-transform: uppercase; border-bottom: 1px solid var(--neon-orange); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 400px), 1fr)); gap: 20px; margin-bottom: 20px; }
        
        /* Side-by-side for Map and Trend Chart */
        .map-chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 500px), 1fr)); gap: 20px; margin-bottom: 20px; }
        
        .panel { background: var(--panel-bg); border: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dotted #333; margin-bottom: 15px; padding-bottom: 10px; }
        input[type="text"] { width: 100%; padding: 10px; background: #000; border: 1px solid var(--neon-orange); color: var(--neon-orange); margin-bottom: 15px; }
        .table-container { flex-grow: 1; max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #333; }
        .energy-bar-bg { background: #222; height: 15px; width: 100%; border: 1px solid #444; }
        .energy-bar-fill { height: 100%; transition: width 1s ease-in-out; }
        button { background: transparent; border: 1px solid var(--neon-orange); color: var(--neon-orange); padding: 5px 10px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--neon-orange); color: #000; }
        #map, #areaMap, .chart-container { height: 350px; width: 100%; border: 1px solid var(--neon-orange); }
    </style>
</head>
<body>

<div class="header"><h1>ToCAWI // Central Command</h1></div>

<div class="grid">
    <div class="panel">
        <div class="panel-header"><h2>Nodes</h2></div>
        <input type="text" id="searchInput" placeholder="Search...">
        <div class="table-container"><table><thead><tr><th>PUID</th><th>Energy</th><th>Action</th></tr></thead><tbody id="tableBody"></tbody></table></div>
    </div>
    <div class="panel">
        <div class="panel-header"><h2>Immunity Distribution</h2></div>
        <div class="chart-container"><canvas id="statChart"></canvas></div>
    </div>
</div>

<div class="map-chart-grid">
    <div class="panel">
        <div class="panel-header"><h2>Critical Zones</h2></div>
        <div id="map"></div>
    </div>
    <div class="panel">
        <div class="panel-header"><h2>Threat Trend Projection</h2></div>
        <div class="chart-container"><canvas id="trendChart"></canvas></div>
    </div>
</div>

<div class="panel"><div class="panel-header"><h2>Regional Threat Matrix</h2></div><div id="areaMap"></div></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let globalData = [], statChart, trendChart;
    const map = L.map('map').setView([-1.29, 36.82], 6);
    const areaMap = L.map('areaMap').setView([-1.29, 36.82], 6);
    [map, areaMap].forEach(m => L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m));

    function renderDashboard() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        globalData.forEach(pet => {
            const energy = Math.random() * 100; // Simulated
            const isCrit = energy < 10;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${pet.PUID}</td>
                <td><div class="energy-bar-bg"><div class="energy-bar-fill ${isCrit ? 'animate-glow' : ''}" style="width: ${energy}%; background: ${isCrit ? 'var(--neon-red)' : 'var(--neon-green)'}"></div></div></td>
                <td><button class="${isCrit ? 'animate-glow' : ''}">Booster</button></td>
            `;
            tbody.appendChild(tr);
        });
        updateCharts();
    }

    function updateCharts() {
        const ctxStat = document.getElementById('statChart').getContext('2d');
        const ctxTrend = document.getElementById('trendChart').getContext('2d');
        if (statChart) statChart.destroy();
        if (trendChart) trendChart.destroy();

        statChart = new Chart(ctxStat, { type: 'doughnut', data: { labels: ['Safe', 'Crit'], datasets: [{ data: [70, 30], backgroundColor: ['#39ff14', '#ff2a2a'] }] } });
        trendChart = new Chart(ctxTrend, { 
            type: 'line', 
            data: { labels: ['W1', 'W2', 'W3', 'W4'], datasets: [{ label: 'Danger Level', data: [5, 12, 8, 25], borderColor: '#ff5f1f', fill: true, backgroundColor: 'rgba(255,95,31,0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    new ResizeObserver(() => { map.invalidateSize(); areaMap.invalidateSize(); }).observe(document.body);
    fetch("https://script.google.com/macros/s/AKfycbzmLKIrjB_mtcfFOZWflqNw-sn15T79PMjupZyye29MUCOtUTkVOXqI2Iu5Sy1MyGj2/exec")
        .then(res => res.json()).then(res => { globalData = res.data; renderDashboard(); });
</script>
</body>
</html>
