<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToCAWI //Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-orange: #ff5f1f;
            --neon-red: #ff2a2a;
            --neon-green: #39ff14;
            --dark-bg: #0a0a0a;
            --panel-bg: #141414;
        }
        * { box-sizing: border-box; }
        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0 auto; 
            padding: 20px; 
            max-width: 1600px; 
            width: 100%; 
        }

        /* Animations */
        @keyframes glow {
            0% { box-shadow: 0 0 5px var(--neon-red); }
            50% { box-shadow: 0 0 20px var(--neon-red); }
            100% { box-shadow: 0 0 5px var(--neon-red); }
        }
        .animate-glow { 
            animation: glow 1.5s infinite; 
            border-color: var(--neon-red) !important; 
            color: var(--neon-red) !important; 
        }

        @keyframes neonPulse {
            0% { opacity: 0.5; text-shadow: 0 0 5px var(--neon-orange); }
            100% { opacity: 1; text-shadow: 0 0 15px var(--neon-orange), 0 0 25px var(--neon-orange); }
        }
        .loading-indicator {
            color: var(--neon-orange);
            text-align: center;
            font-size: 1.2rem;
            padding: 40px 20px;
            animation: neonPulse 1s alternate infinite ease-in-out;
            letter-spacing: 2px;
        }

        .header { 
            text-align: center; 
            color: var(--neon-orange); 
            text-shadow: 0 0 10px var(--neon-orange); 
            margin-bottom: 30px; 
            text-transform: uppercase; 
            border-bottom: 1px solid var(--neon-orange); 
            padding-bottom: 10px; 
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 350px), 1fr)); 
            gap: 20px; 
            margin-bottom: 20px; 
        }
        
        .panel { 
            background: var(--panel-bg); 
            border: 1px solid #333; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }
        
        .panel-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px dotted #333; 
            margin-bottom: 15px; 
            padding-bottom: 10px; 
        }

        .panel-header h2 { margin: 0; font-size: 1.1rem; }
        
        .vaccinate-btn {
            background: rgba(255, 95, 31, 0.1);
            border: 1px solid var(--neon-orange);
            color: var(--neon-orange);
            padding: 6px 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
        .vaccinate-btn:hover {
            background: var(--neon-orange);
            color: #000;
        }

        input[type="text"] { 
            width: 100%; 
            padding: 10px; 
            background: #000; 
            border: 1px solid var(--neon-orange); 
            color: var(--neon-orange); 
            margin-bottom: 15px; 
            font-family: 'Orbitron';
        }
        
        .table-container { flex-grow: 1; max-height: 400px; overflow-y: auto; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.75em; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #333; }
        
        .energy-bar-bg { background: #222; height: 12px; width: 100%; border: 1px solid #444; }
        .energy-bar-fill { height: 100%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .booster-btn { 
            background: transparent; 
            border: 1px solid var(--neon-orange); 
            color: var(--neon-orange); 
            padding: 4px 8px; 
            cursor: pointer; 
            font-size: 0.65rem;
            font-family: 'Orbitron';
        }
        .booster-btn:hover { background: var(--neon-orange); color: #000; }
        .booster-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #map, #areaMap, .chart-container { height: 350px; width: 100%; border: 1px solid var(--neon-orange); }

        /* Pie chart pushed to bottom */
        .doughnut-container {
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            padding-bottom: 10px;
        }
        
        canvas { max-width: 100%; }
    </style>
</head>
<body>

<div class="header"><h1>ToCAWI</h1></div>

<div class="grid">
    <div class="panel">
        <div class="panel-header">
            <h2>Nodes</h2>
            <button class="vaccinate-btn" onclick="window.location.href='https://tocawi.github.io/registration-vaccination/'">Vaccinate</button>
        </div>
        <input type="text" id="searchInput" placeholder="Search Microchip..." onkeyup="filterTable()">
        
        <div id="loadingIndicator" class="loading-indicator">LOADING DATA...</div>
        
        <div class="table-container" id="dataTableContainer" style="display: none;">
            <table>
                <thead>
                    <tr><th>Microchip</th><th>Energy</th><th>Action</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    
    <div class="panel">
        <div class="panel-header"><h2>Immunity Distribution</h2></div>
        <div class="chart-container doughnut-container">
            <canvas id="statChart"></canvas>
        </div>
    </div>
</div>

<div class="grid">
    <div class="panel">
        <div class="panel-header"><h2>Critical Zones</h2></div>
        <div id="map"></div>
    </div>
    <div class="panel">
        <div class="panel-header"><h2>Threat Trend</h2></div>
        <div class="chart-container">
            <canvas id="trendChart"></canvas>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzmLKIrjB_mtcfFOZWflqNw-sn15T79PMjupZyye29MUCOtUTkVOXqI2Iu5Sy1MyGj2/exec";
    let globalData = [], statChart, trendChart;
    const map = L.map('map').setView([-1.29, 36.82], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function calculateEnergy(dateStr) {
        if (!dateStr) return 0;
        const vacDate = new Date(dateStr);
        const now = new Date();
        const diffDays = (now - vacDate) / (1000 * 60 * 60 * 24);
        return Math.max(0, Math.min(100, 100 - (diffDays / 365) * 100));
    }

    async function applyBooster(index, puid) {
        const btn = document.querySelectorAll('.booster-btn')[index];
        btn.disabled = true;
        btn.innerText = "SYCHING...";

        // 1. Optimistic UI Update (Update local data immediately)
        globalData[index].Date = new Date().toISOString(); 
        renderDashboard(false); // Render without full fetch

        // 2. Background persistence to Apps Script
        try {
            await fetch(`${SCRIPT_URL}?action=boost&puid=${puid}`, { mode: 'no-cors' });
            console.log(`Node ${puid} boosted successfully.`);
            btn.innerText = "BOOSTED";
        } catch (e) {
            console.error("Sync failed", e);
            btn.innerText = "RETRY";
            btn.disabled = false;
        }
    }

    function renderDashboard(isFirstLoad = true) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        
        globalData.forEach((pet, index) => {
            const energy = calculateEnergy(pet.Date || pet.date || pet.Timestamp || pet['Vaccination Date']);
            const isCrit = energy < 10;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${pet.PUID}</td>
                <td>
                    <div class="energy-bar-bg">
                        <div class="energy-bar-fill ${isCrit ? 'animate-glow' : ''}" 
                             style="width: ${energy}%; background: ${isCrit ? 'var(--neon-red)' : 'var(--neon-green)'}">
                        </div>
                    </div>
                </td>
                <td>
                    <button class="booster-btn ${isCrit ? 'animate-glow' : ''}" onclick="applyBooster(${index}, '${pet.PUID}')">
                        Booster
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        if (isFirstLoad) {
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('dataTableContainer').style.display = 'block';
        }
        updateCharts();
    }

    function updateCharts() {
        const ctxStat = document.getElementById('statChart').getContext('2d');
        if (statChart) statChart.destroy();

        let safe = 0, crit = 0;
        globalData.forEach(p => calculateEnergy(p.Date || p.date || p.Timestamp || p['Vaccination Date']) < 10 ? crit++ : safe++);

        statChart = new Chart(ctxStat, { 
            type: 'doughnut', 
            data: { labels: ['Safe', 'Crit'], datasets: [{ data: [safe || 1, crit], backgroundColor: ['#39ff14', '#ff2a2a'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        if (!trendChart) {
            const ctxTrend = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctxTrend, { 
                type: 'line', 
                data: { labels: ['W1', 'W2', 'W3', 'W4'], datasets: [{ label: 'Threat', data: [10, 25, 15, 40], borderColor: '#ff5f1f', tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    }

    function filterTable() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let rows = document.querySelector("#tableBody").rows;
        for (let row of rows) {
            row.style.display = row.cells[0].textContent.toUpperCase().includes(input) ? "" : "none";
        }
    }

    // Initial Fetch
    fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(res => { globalData = res.data; renderDashboard(); })
        .catch(() => { document.getElementById('loadingIndicator').innerText = "CONNECTION ERROR"; });

    new ResizeObserver(() => map.invalidateSize()).observe(document.body);
</script>
</body>
</html>
