<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToCAWI //Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-orange: #ff5f1f;
            --neon-red: #ff2a2a;
            --neon-green: #39ff14;
            --neon-yellow: #fefe33;
            --dark-bg: #0a0a0a;
            --panel-bg: #141414;
        }
        * { box-sizing: border-box; }
        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0 auto; 
            padding: 15px; 
            max-width: 1600px; 
            width: 100%; 
        }

        /* Animations */
        @keyframes glow {
            0% { box-shadow: 0 0 5px var(--neon-red); }
            50% { box-shadow: 0 0 20px var(--neon-red); }
            100% { box-shadow: 0 0 5px var(--neon-red); }
        }
        .animate-glow { 
            animation: glow 1.5s infinite; 
            border-color: var(--neon-red) !important; 
            color: var(--neon-red) !important; 
        }

        @keyframes neonPulse {
            0% { opacity: 0.5; text-shadow: 0 0 5px var(--neon-orange); }
            100% { opacity: 1; text-shadow: 0 0 15px var(--neon-orange), 0 0 25px var(--neon-orange); }
        }
        .loading-indicator {
            color: var(--neon-orange);
            text-align: center;
            font-size: 1.2rem;
            padding: 40px 20px;
            animation: neonPulse 1s alternate infinite ease-in-out;
            letter-spacing: 2px;
        }

        .header { 
            text-align: center; 
            color: var(--neon-orange); 
            text-shadow: 0 0 10px var(--neon-orange); 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            border-bottom: 1px solid var(--neon-orange); 
            padding-bottom: 10px; 
        }
        
        /* Responsive Grids */
        .grid, .map-chart-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr)); 
            gap: 20px; 
            margin-bottom: 20px; 
        }
        
        .panel { 
            background: var(--panel-bg); 
            border: 1px solid #333; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            border-radius: 8px; /* Added slight rounding for polish */
        }
        
        .panel-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px dotted #333; 
            margin-bottom: 15px; 
            padding-bottom: 10px; 
            flex-wrap: wrap; /* Allows wrapping on very small screens */
            gap: 10px;
        }

        .panel-header h2 { margin: 0; font-size: 1.2rem; }
        
        /* Vaccinate Button Styling */
        .vaccinate-btn {
            background: rgba(255, 95, 31, 0.1);
            border: 1px solid var(--neon-orange);
            color: var(--neon-orange);
            padding: 8px 15px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(255, 95, 31, 0.5);
            transition: all 0.3s ease;
        }
        .vaccinate-btn:hover {
            background: var(--neon-orange);
            color: #000;
            box-shadow: 0 0 15px var(--neon-orange);
        }

        input[type="text"] { 
            width: 100%; 
            padding: 10px; 
            background: #000; 
            border: 1px solid var(--neon-orange); 
            color: var(--neon-orange); 
            margin-bottom: 15px; 
            border-radius: 4px;
        }
        
        .table-container { 
            flex-grow: 1; 
            max-height: 400px; 
            overflow-y: auto; 
            overflow-x: auto; 
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.85em; 
            min-width: 350px; /* Adjusted to fit the extra column */
        }
        th, td { 
            text-align: left; 
            padding: 10px; 
            border-bottom: 1px solid #333; 
        }
        
        .energy-bar-bg { 
            background: #222; 
            height: 15px; 
            width: 100%; 
            min-width: 60px;
            border: 1px solid #444; 
            border-radius: 2px;
        }
        .energy-bar-fill { 
            height: 100%; 
            transition: width 1s ease-in-out; 
        }
        
        button { 
            background: transparent; 
            border: 1px solid var(--neon-orange); 
            color: var(--neon-orange); 
            padding: 5px 10px; 
            cursor: pointer; 
            transition: 0.3s;
            border-radius: 4px;
        }
        button:hover { 
            background: var(--neon-orange); 
            color: #000; 
        }
        
        #map, #areaMap, .chart-container { 
            height: 350px; 
            width: 100%; 
            border: 1px solid var(--neon-orange); 
            border-radius: 4px;
            position: relative;
        }

        .doughnut-container {
            display: flex;
            align-items: center; 
            justify-content: center;
            padding: 15px; 
        }
        
        canvas { max-width: 100%; }

        /* Mobile Adjustments for Seamless Display */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .panel { padding: 15px; }
            #map, #areaMap, .chart-container { height: 280px; }
            .header h1 { font-size: 1.5rem; }
            .vaccinate-btn { width: 100%; text-align: center; }
            th, td { padding: 8px 5px; font-size: 0.8rem; }
        }
        
    </style>
</head>
<body>

<div class="header"><h1>ToCAWI</h1></div>

<div class="grid">
    <div class="panel">
        <div class="panel-header">
            <h2>Pets</h2>
            <button class="vaccinate-btn" onclick="window.location.href='https://tocawi.github.io/registration-vaccination/'">Vaccinate</button>
        </div>
        <input type="text" id="searchInput" placeholder="Search...">
        
        <div id="loadingIndicator" class="loading-indicator">LOADING DATA...</div>
        
        <div class="table-container" id="dataTableContainer" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>Name</th> <th>Microchip</th>
                        <th>Energy</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    
    <div class="panel">
        <div class="panel-header"><h2>Immunity Distribution</h2></div>
        <div class="chart-container doughnut-container">
            <canvas id="statChart"></canvas>
        </div>
    </div>
</div>

<div class="map-chart-grid">
    <div class="panel">
        <div class="panel-header"><h2>Critical Zones</h2></div>
        <div id="map"></div>
    </div>
    <div class="panel">
        <div class="panel-header"><h2>Threat Trend Projection</h2></div>
        <div class="chart-container">
            <canvas id="trendChart"></canvas>
        </div>
    </div>
</div>

<div class="panel">
    <div class="panel-header"><h2>Regional Threat</h2></div>
    <div id="areaMap"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let globalData = [], statChart, trendChart;
    const map = L.map('map').setView([-1.29, 36.82], 6);
    const areaMap = L.map('areaMap').setView([-1.29, 36.82], 6);
    [map, areaMap].forEach(m => L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m));

    function renderDashboard() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        
        const now = new Date();

        globalData.forEach(pet => {
            let energy = 0;
            
            const dateStr = pet.Date || pet.date || pet.Timestamp || pet.timestamp || pet['Vaccination Date'];
            
            if (dateStr) {
                const vacDate = new Date(dateStr);
                const diffTime = now - vacDate;
                const diffDays = diffTime / (1000 * 60 * 60 * 24);
                energy = Math.max(0, 100 - (diffDays / 365) * 100);
            }

            const isCrit = energy < 10;
            
            // Extract pet name dynamically by reading the 3rd property (Column C) directly
            const petName = Object.values(pet)[2] || pet.Name || pet.name || pet['Pet Name'] || pet.pet_name || 'Unknown';
            const microchip = pet.PUID || pet.puid || 'Unknown';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${petName}</strong></td>
                <td>${microchip}</td>
                <td><div class="energy-bar-bg"><div class="energy-bar-fill ${isCrit ? 'animate-glow' : ''}" style="width: ${energy}%; background: ${isCrit ? 'var(--neon-red)' : 'var(--neon-green)'}"></div></div></td>
                <td><button class="${isCrit ? 'animate-glow' : ''}">Booster</button></td>
            `;
            tbody.appendChild(tr);
        });
        updateCharts();
    }

    function updateCharts() {
        const ctxStat = document.getElementById('statChart').getContext('2d');
        const ctxTrend = document.getElementById('trendChart').getContext('2d');
        if (statChart) statChart.destroy();
        if (trendChart) trendChart.destroy();

        let safeCount = 0;
        let critCount = 0;
        
        const now = new Date();
        globalData.forEach(pet => {
            const dateStr = pet.Date || pet.date || pet.Timestamp || pet.timestamp || pet['Vaccination Date'];
            let energy = 0;
            if(dateStr) {
                const vacDate = new Date(dateStr);
                const diffDays = (now - vacDate) / (1000 * 60 * 60 * 24);
                energy = Math.max(0, 100 - (diffDays / 365) * 100);
            }
            if (energy < 10) critCount++;
            else safeCount++;
        });

        if (safeCount === 0 && critCount === 0) {
            safeCount = 70;
            critCount = 30;
        }

        statChart = new Chart(ctxStat, { 
            type: 'doughnut', 
            data: { 
                labels: ['Safe', 'Critical'], 
                datasets: [{ data: [safeCount, critCount], backgroundColor: ['#39ff14', '#ff2a2a'], borderWidth: 1, borderColor: '#000' }] 
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#fff', font: { family: 'Orbitron' } } }
                }
            }
        });
        
        trendChart = new Chart(ctxTrend, { 
            type: 'line', 
            data: { 
                labels: ['W1', 'W2', 'W3', 'W4'], 
                datasets: [{ label: 'Danger Level', data: [5, 12, 8, 25], borderColor: '#ff5f1f', fill: true, backgroundColor: 'rgba(255,95,31,0.1)', tension: 0.4 }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: '#fff' } },
                    x: { grid: { color: '#333' }, ticks: { color: '#fff' } }
                },
                plugins: {
                    legend: { labels: { color: '#fff', font: { family: 'Orbitron' } } }
                }
            }
        });
    }

    // Force map resizing whenever layout changes natively
    new ResizeObserver(() => { 
        if(map) map.invalidateSize(); 
        if(areaMap) areaMap.invalidateSize(); 
    }).observe(document.body);
    
    // Fetch data and handle loading state
    fetch("https://script.google.com/macros/s/AKfycbzmLKIrjB_mtcfFOZWflqNw-sn15T79PMjupZyye29MUCOtUTkVOXqI2Iu5Sy1MyGj2/exec")
        .then(res => res.json())
        .then(res => { 
            globalData = res.data; 
            
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('dataTableContainer').style.display = 'block';
            
            renderDashboard(); 
        })
        .catch(err => {
            document.getElementById('loadingIndicator').innerHTML = 'SYSTEM ERROR: UNABLE TO FETCH DATA';
            document.getElementById('loadingIndicator').style.color = 'var(--neon-red)';
            document.getElementById('loadingIndicator').style.animation = 'none';
        });

    // Add Search functionality to the input
    document.getElementById('searchInput').addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        const rows = document.querySelectorAll('#tableBody tr');
        
        rows.forEach(row => {
            const nameCell = row.cells[0].textContent.toLowerCase();
            const chipCell = row.cells[1].textContent.toLowerCase();
            
            if (nameCell.includes(searchTerm) || chipCell.includes(searchTerm)) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    });
</script>
</body>
</html>
